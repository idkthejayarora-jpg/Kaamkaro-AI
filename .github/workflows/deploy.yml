name: Deploy to Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

  # Optional: auto-commit data changes back to GitHub
  # Useful if you want GitHub to act as a "database backup"
  # Requires: GITHUB_TOKEN (automatic), and your Railway env to have a webhook
  # that triggers a repo dispatch. For now this is manual / on-push only.
