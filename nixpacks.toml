# Nixpacks build config for Kaamkaro AI (monorepo: client/ + server/)
# Explicit phases so Railway knows exactly how to build this monorepo.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd client && npm install",
  "cd server && npm install"
]

[phases.build]
cmds = [
  "cd client && npm run build"
]
dependsOn = ["install"]

[start]
cmd = "NODE_ENV=production node server/index.js"
