# Nixpacks build config for Kaamkaro AI (monorepo: client/ + server/)
# Only defines install/build phases — start command is in railway.toml [deploy].
# Having [start] here AND startCommand in railway.toml causes a bash-not-found conflict.

[phases.install]
cmds = [
  "cd client && npm install",
  "cd server && npm install"
]

[phases.build]
cmds = [
  "cd client && npm run build"
]
dependsOn = ["install"]
